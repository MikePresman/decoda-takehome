name: Database Ops

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Database operation to run
        required: true
        type: choice
        options:
          - migrate
          - seed
      environment_name:
        description: Target environment label
        required: true
        default: production
        type: choice
        options:
          - production
      confirm_seed:
        description: Required only for seed. Type exactly SEED_PRODUCTION to allow a destructive reload.
        required: false
        type: string

permissions:
  contents: read

jobs:
  database-op:
    name: Run ${{ inputs.operation }} on ${{ inputs.environment_name }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate DATABASE_URL secret
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "DATABASE_URL secret is not configured for this GitHub environment."
            exit 1
          fi

      - name: Run Alembic migrations
        if: ${{ inputs.operation == 'migrate' }}
        run: python -m alembic upgrade head

      - name: Require explicit seed confirmation
        if: ${{ inputs.operation == 'seed' }}
        run: |
          if [ "${{ inputs.confirm_seed }}" != "SEED_PRODUCTION" ]; then
            echo "Refusing to run production seed without confirm_seed=SEED_PRODUCTION"
            exit 1
          fi

      - name: Run production seed import
        if: ${{ inputs.operation == 'seed' }}
        run: python -m app.db.seed_db
